<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TubeTeam 官方 Wiki | tcbuildmc.github.io</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="//fastly.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Giscus -->
  <link rel="stylesheet" href="//fastly.jsdelivr.net/npm/docsify-giscus@1.0.0/dist/giscus.css">
</head>
<body>
  <div id="app">Loading... | 加载中...</div>
  <script>
    window.$docsify = {
      name: 'TubeTeam',
      repo: 'https://github.com/TCBuildMC',
      loadSidebar: true,
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      alias: {
        '/tubecraft/.*/_sidebar.md': '/tubecraft/_sidebar.md',
        '/noob-tutorial/.*/_sidebar.md': '/noob-tutorial/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md'
      },
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索...',
        noData: '无结果',
        depth: 4
      },
      copyCode: {
        buttonText: '点击复制',
        errorText: '出错了!',
        successText: '已复制!',
      },
      pagination: {
        previousText: {
          '/': '上一章节'
        },
        nextText: {
          '/': '下一章节'
        },
        crossChapter: true,
        crossChapterText: true,
      },
      tabs: {
        tabComments: true,
        tabHeadings: true,
        sync: false
      },
      scrollToTop: {
        auto: true,
        text: '↑',
        right: 12,
        bottom: 52,
        offset: 25
      },
      hideCode: {
        scroll: true,
        height: 300
      },
      'flexible-alerts': {
        style: 'flat',
        note: {
          label: '笔记'
        },
        tip: {
          label: '提示'
        },
        warning: {
          label: '警告'
        },
        attention: {
          label: '注意'
        }
      },
      giscus: {
        repo: "TCBuildMC/tcbuildmc.github.io",
        repoId: "R_kgDOM04DVw",
        category: "General",
        categoryId: "DIC_kwDOM04DV84CiqOH",
        mapping: "title",
        reactionsEnabled: "0",
        strict: "1",
        emitMetadata: "0",
        inputPosition: "top",
        theme: "preferred_color_scheme",
        lang: "zh-CN",
        loading: "lazy",
        // crossorigin: "anonymous",
        // async: true
      },
      // toc: {
      //   tocMaxLevel: 3,
      //   target: 'h2, h3, h4, h5, h6',
      //   ignoreHeaders:  ['<!-- {docsify-ignore} -->', '<!-- {docsify-ignore-all} -->']
      // },
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//fastly.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索框 -->
  <script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- 图片缩放 -->
  <script src="//fastly.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <!-- 复制代码 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-copy-code"></script>
  <!-- 翻页 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- TAB 拓展 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-tabs@1"></script>
  <!-- 回到顶部 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-scroll-to-top@latest/dist/docsify-scroll-to-top.min.js"></script>
  <!-- 代码折叠 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-hide-code/dist/docsify-hide-code.min.js"></script>
  <!-- 自定义提示框 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-plugin-flexible-alerts"></script>
  <!-- 脚注 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-footnote/dist/docsify-footnote.min.js"></script>
  <!-- 图片描述 -->
  <script src="//fastly.jsdelivr.net/gh/h-hg/docsify-image-caption/dist/docsify-image-caption.min.js"></script>
  <!-- 侧边栏展开优化 -->
  <script src="//fastly.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- Giscus -->
  <script src="//fastly.jsdelivr.net/npm/docsify-giscus@1.0.0/dist/docsify-giscus.min.js"></script>
  <!-- 本章目录拓展组件 -->
  <!-- <script src="//fastly.jsdelivr.net/npm/docsify-plugin-toc@1.3.1/dist/docsify-plugin-toc.min.js"></script> -->
</body>
</html>
